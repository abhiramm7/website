<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Merge PDFs · PDF Tools — Abhiram Mullapudi</title>
    <meta name="description" content="Merge multiple PDFs into a single file in any order. Runs entirely in your browser — your files never leave your device." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://randomstorms.net/pdf-tools/merge.html" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/site.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌧️</text></svg>">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="brand" href="../">RANDOM // STORMS</a>
            <nav class="site-header-links">
                <a href="../">Home</a>
                <a href="./">All tools</a>
            </nav>
        </div>
    </header>

    <main class="page-container tool-page">
        <a class="back-link" href="./">← back to tools</a>
        <h1>Merge PDFs</h1>
        <p class="subtitle">Drop two or more PDFs, drag them to reorder, then download a single merged PDF. Files stay in your browser.</p>

        <div class="dropzone" id="dropzone">
            <div class="icon">⬆</div>
            <h3>Drop PDFs here</h3>
            <p>or click to choose files</p>
            <input type="file" />
        </div>

        <div class="file-list" id="files"></div>

        <div class="btn-row">
            <button class="btn" id="run" disabled>Merge &amp; download</button>
            <button class="btn btn-secondary" id="clear" disabled>Clear all</button>
        </div>

        <div class="status" id="status"></div>
        <div class="progress" id="progress"><div class="progress-bar"></div></div>
    </main>

    <footer>
        <div class="footer-inner">
            <p>Part of <a href="../">randomstorms.net</a> · runs entirely in your browser</p>
        </div>
    </footer>

    <script type="module" src="./js/merge.js"></script>
</body>
